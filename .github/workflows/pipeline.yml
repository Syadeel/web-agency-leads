name: Lead Pipeline (24/7)

on:
  schedule:
    - cron: '0 23 * * *'  # 23:00 UTC = 4:00 AM PKT
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv gspread google-auth tavily firecrawl-py

      - name: Scrape leads (Tavily + Firecrawl, heavy mode for Pakistan)
        id: scrape
        continue-on-error: true
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scraper_v2.py --daily --heavy

